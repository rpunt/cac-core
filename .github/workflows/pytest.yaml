name: Run Unit Test via Pytest

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # required for setuptools-scm to resolve version from tags
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check lock file is up to date
        run: uv lock --check
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint with Ruff
        run: uv run ruff check --output-format=github .
        continue-on-error: true
      - name: Check code formatting with Ruff
        run: uv run ruff format --diff .
        continue-on-error: true
      - name: Test with pytest
        # Coverage is gated so a change that ships untested code fails CI. The
        # threshold sits just under the current level to leave a little headroom
        # without letting coverage silently erode.
        run: uv run pytest --cov=cac_core --cov-report=term-missing --cov-fail-under=90
